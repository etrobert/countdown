---
name: Build

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs per ref while iterating, but let every main commit
# finish so its output lands in tower's store (served by harmonia).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: build
    runs-on: [self-hosted, Linux]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # The self-hosted runner already has Nix.
      - name: Build
        run: nix build .#default --print-build-logs
