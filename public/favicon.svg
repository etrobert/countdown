<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <!-- countdown clock -->
  <circle cx="24" cy="25" r="18" fill="none" stroke="#d8c6ff" stroke-width="4" />
  <!-- remaining-time arc, sweeping clockwise from 12 o'clock -->
  <path d="M24 7 A18 18 0 0 1 40.6 33" fill="none" stroke="#863bff" stroke-width="4" stroke-linecap="round" />
  <!-- 12 o'clock tick -->
  <rect x="22.25" y="1.5" width="3.5" height="7" rx="1.75" fill="#863bff" />
  <!-- hands -->
  <line x1="24" y1="25" x2="24" y2="13" stroke="#863bff" stroke-width="3.5" stroke-linecap="round" />
  <line x1="24" y1="25" x2="33" y2="28" stroke="#863bff" stroke-width="3.5" stroke-linecap="round" />
  <!-- center pivot -->
  <circle cx="24" cy="25" r="3" fill="#863bff" />
</svg>
